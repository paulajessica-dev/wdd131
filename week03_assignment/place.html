<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maldives Beach | Travel & Weather Guide</title>
    <meta name="description" content="Explore the beauty of the Maldives with travel information, weather details, and stunning beach scenery.">
    <meta name="author" content="Paula Jessica Silva">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="styles/place.css">
    
</head>
<body>
    <header>        
            <h1>Maldivas Beach</h1> 
    </header>
    <main class="container">

        <section class="hero">
            <picture>
                <source srcset="images/maldivas-large.webp" media="(min-width: 1000px)">
                <source srcset="images/maldivas-medium.webp" media="(min-width: 550px)">
                <img src="images/maldivas-small.webp" alt="Maldivas Beach">
            </picture>
        </section>
                <section class="card data-card">
            <h2><span class="title">Data</span> </h2>

            <p><strong>Area:</strong> 298 km²</p>
            <p><strong>Population:</strong> 521,000</p>
            <p><strong>Capital:</strong> Malé</p>
            <p><strong>Language:</strong> Dhivehi</p>
            <p><strong>Currency:</strong> Rufiyaa</p>
        </section>     
        <section class="card weather-card">
            <h2>
                <span class="title">Weather</span>            
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="80"
                    height="80"
                    viewBox="0 0 64 64"
                    class="weather-icon"
                >
                    <!-- Sol -->
                    <circle cx="24" cy="24" r="10" fill="#FDB813"/>

                    <!-- Raios -->
                    <line x1="24" y1="6" x2="24" y2="0" stroke="#FDB813" stroke-width="3"/>
                    <line x1="24" y1="48" x2="24" y2="42" stroke="#FDB813" stroke-width="3"/>
                    <line x1="6" y1="24" x2="0" y2="24" stroke="#FDB813" stroke-width="3"/>
                    <line x1="48" y1="24" x2="42" y2="24" stroke="#FDB813" stroke-width="3"/>

                    <line x1="11" y1="11" x2="6" y2="6" stroke="#FDB813" stroke-width="3"/>
                    <line x1="37" y1="37" x2="42" y2="42" stroke="#FDB813" stroke-width="3"/>
                    <line x1="11" y1="37" x2="6" y2="42" stroke="#FDB813" stroke-width="3"/>
                    <line x1="37" y1="11" x2="42" y2="6" stroke="#FDB813" stroke-width="3"/>

                    <!-- Nuvem -->
                    <ellipse cx="38" cy="40" rx="16" ry="10" fill="#D6D6D6"/>
                    <ellipse cx="28" cy="40" rx="10" ry="8" fill="#D6D6D6"/>
                    <ellipse cx="46" cy="36" rx="10" ry="8" fill="#D6D6D6"/>
                </svg>
            </h2>

            <p>Temperature: <span id="temperature"></span>°C</p>
            <p>Wind Speed: <span id="windspeed"></span> km/h</p>
            <p>Wind Chill: <span id="windchill"></span></p>
    </section>
    </main>
        <footer>
         <p>
            ©<span id="currentyear"></span>
            🌺 Paula Jessica Silva 🌺
            Fortaleza, Ceará
        </p>
        <p id="lastModified"></p>
    </footer>
    <script src="scripts/place.js" defer></script>
</body>
</html>
